<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard de Vendas GVC — Ao Vivo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* Seu estilo CSS aqui, mantido sem alterações */
  </style>
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <div class="loader-logo">GVC</div>
    <div class="loader-sub">Dashboard de Vendas</div>
    <div class="loader-msg" id="loader-msg">Conectando ao Ploomes...</div>
    <div class="loader-bar"><div class="loader-fill"></div></div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <div class="logo-icon">GVC</div>
      <div>
        <div class="header-title">Dashboard de Vendas — Grupo GVC</div>
        <div class="header-sub" id="header-sub">CRM Ploomes · Carregando...</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <button class="btn-refresh" id="btn-refresh" onclick="loadDashboard()" title="Atualizar dados do Ploomes">🔄 Atualizar</button>
      <div class="header-date" id="header-date">📅 --/--/----</div>
    </div>
  </div>

  <!-- KPI Section -->
  <div class="container">
    <div class="fc-banner">
      <div>
        <div class="fc-label">⚡ Forecast Total em Pipeline</div>
        <div class="fc-val" id="fc-val">R$ —</div>
      </div>
      <div style="text-align:right">
        <div class="fc-label">Meta Mensal do Time</div>
        <div class="fc-val" id="meta-val">R$ —</div>
      </div>
    </div>
  </div>

  <script>
    function f(n) {
      return 'R$ ' + Math.round(n).toLocaleString('pt-BR');
    }

    // Chama a API e atualiza os valores do Dashboard
    async function loadDashboard() {
      const res = await fetch('/api/ploomes');
      const data = await res.json();

      // Atualizar valores do KPI
      document.getElementById('fc-val').textContent = f(data.G.total_rev);
      document.getElementById('meta-val').textContent = f(335000); // Exemplo de meta
      document.getElementById('header-date').textContent = `📅 ${new Date().toLocaleDateString()}`;
    }
    
    loadDashboard(); // Inicializa o Dashboard
  </script>
</body>
</html>
